name: Update Docs

on:
  workflow_run:
    workflows: ["Collect and Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reponomics-update-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-docs:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Resolve Reponomics configuration
        run: python .github/scripts/resolve-reponomics-config.py --require-setup

      - name: Update managed Reponomics docs
        if: env.REPONOMICS_SETUP_COMPLETE == 'true'
        uses: ./.github/actions/reponomics
        with:
          mode: update-docs
          github-token: ${{ github.token }}
