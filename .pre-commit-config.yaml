default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff
        entry: make lint
        language: system
        pass_filenames: false
        types_or: [python]

      - id: mypy
        name: mypy
        entry: make type-check
        language: system
        pass_filenames: false
        types_or: [python]

      - id: action-yaml
        name: action.yml parse
        entry: make validate-action
        language: system
        pass_filenames: false
        files: ^action\.yml$

      - id: workflow-yaml
        name: GitHub workflow YAML parse
        entry: make validate-workflows
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$

      - id: fixture-checks
        name: Fixture checks
        entry: make fixtures
        language: system
        pass_filenames: false

      - id: build-and-verify-generated
        name: Build and verify generated outputs
        entry: make build-and-verify-generated
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
