name: Publish Demo Repository

on:
  schedule:
    - cron: "23 8 * * *"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to publish from"
        required: true
        type: string
        default: main
      confirm_demo_publish:
        description: "Publish generated demo repository"
        required: true
        type: boolean
        default: false

permissions: {}

concurrency:
  group: demo-publication-${{ github.event.inputs.source_ref || github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  DEMO_DAILY_SOURCE_REF: ${{ vars.DEMO_DAILY_SOURCE_REF || 'main' }}
  DEMO_EXPECTED_REPO: reponomics/reponomics-dashboard-demo
  DEMO_BRANCH: main

jobs:
  build-demo-artifact:
    name: Build generated demo artifact
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.confirm_demo_publish) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Resolve publication source
        id: source-ref
        env:
          MANUAL_SOURCE_REF: ${{ inputs.source_ref || '' }}
        run: |
          set -euo pipefail

          case "${GITHUB_EVENT_NAME}" in
            schedule)
              source_ref="${DEMO_DAILY_SOURCE_REF}"
              ;;
            workflow_dispatch)
              source_ref="${MANUAL_SOURCE_REF}"
              ;;
            *)
              echo "Unsupported demo publication event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ -z "$source_ref" ]]; then
            echo "Demo publication source ref is empty." >&2
            exit 1
          fi

          case "$source_ref" in
            main|refs/heads/main|demo-stable|refs/heads/demo-stable|reponomics-dashboard-v*|refs/tags/reponomics-dashboard-v*|v*|refs/tags/v*) ;;
            *)
              echo "Demo publication is restricted to main, demo-stable, or release tags; got $source_ref." >&2
              exit 1
              ;;
          esac

          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.source-ref.outputs.source_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build and verify generated demo
        run: |
          set -euo pipefail
          make verify-demo
          DEMO_REMOTE="https://github.com/${DEMO_EXPECTED_REPO}.git" make publish-demo-dry-run

      - name: Package generated demo artifact
        run: |
          set -euo pipefail
          git rev-parse HEAD > demo-source-commit.txt
          test -s dist/demo-seed/dashboard-data.enc
          rm -rf demo-dashboard-data-seed
          mkdir demo-dashboard-data-seed
          cp dist/demo-seed/dashboard-data.enc demo-dashboard-data-seed/dashboard-data.enc
          tar -C dist/demo -czf demo-repo.tar.gz .

      - name: Upload generated demo artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-demo-repo
          path: |
            demo-repo.tar.gz
            demo-source-commit.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload encrypted demo dashboard data seed
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-demo-dashboard-data
          path: demo-dashboard-data-seed/dashboard-data.enc
          if-no-files-found: error
          retention-days: 7

  publish-demo:
    name: Publish generated demo
    needs: build-demo-artifact
    runs-on: ubuntu-24.04
    permissions:
      actions: read
    steps:
      - name: Download generated demo artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-demo-repo
          path: publication-input

      - name: Validate downloaded demo artifact
        run: |
          set -euo pipefail
          mkdir demo-repo
          tar -xzf publication-input/demo-repo.tar.gz -C demo-repo
          test -f publication-input/demo-source-commit.txt
          test -f demo-repo/README.md
          test -f demo-repo/docs/index.html
          test -f demo-repo/.reponomics/demo-provenance.json
          test -f demo-repo/.github/workflows/seed-and-publish-demo-dashboard.yml
          test ! -e demo-repo/data
          test ! -e demo-repo/dist
          test ! -e demo-repo/.dashboard-data-artifact
          if grep -R -n -E 'reponomics-labs|internal-tools|customer|stealth' demo-repo; then
            echo "Generated demo output contains a blocked public brand-risk term." >&2
            exit 1
          fi

      - name: Create demo publication app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.DEMO_PUBLISH_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEMO_PUBLISH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: reponomics-dashboard-demo
          permission-contents: write
          permission-workflows: write
          permission-actions: write

      - name: Publish generated demo repository
        shell: bash
        env:
          RELEASE_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          source_commit="$(cat publication-input/demo-source-commit.txt)"
          if [[ ! "$source_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Downloaded demo source commit is not a full commit SHA: $source_commit" >&2
            exit 1
          fi

          cd demo-repo
          git init -b "${DEMO_BRANCH}"
          git config user.name "reponomics-dashboard[bot]"
          git config user.email "286571062+reponomics-dashboard[bot]@users.noreply.github.com"
          git add -A
          git -c core.hooksPath=/dev/null commit \
            -m "chore: publish generated demo" \
            -m "Source-Commit: ${source_commit}"
          git remote add target "https://x-access-token:${RELEASE_TOKEN}@github.com/${DEMO_EXPECTED_REPO}.git"

          remote_ref="refs/heads/${DEMO_BRANCH}"
          lease_ref="refs/remotes/target/${DEMO_BRANCH}"
          remote_oid="$(git ls-remote --heads target "${DEMO_BRANCH}" | awk '{print $1}')"
          if [[ -n "$remote_oid" ]]; then
            git fetch target "${remote_ref}:${lease_ref}"
            lease="--force-with-lease=${remote_ref}:${remote_oid}"
          else
            lease="--force-with-lease=${remote_ref}:"
          fi
          git push "$lease" target "HEAD:${remote_ref}"

          for attempt in 1 2 3 4 5; do
            if GH_TOKEN="$RELEASE_TOKEN" gh api \
              --method POST \
              "repos/${DEMO_EXPECTED_REPO}/actions/workflows/seed-and-publish-demo-dashboard.yml/dispatches" \
              -f ref="${DEMO_BRANCH}" \
              -f inputs[source_run_id]="${SOURCE_RUN_ID}" \
              -f inputs[source_repository]="${GITHUB_REPOSITORY}"; then
              exit 0
            fi
            sleep "$((attempt * 3))"
          done

          echo "Failed to dispatch target demo seed-and-publish workflow." >&2
          exit 1
