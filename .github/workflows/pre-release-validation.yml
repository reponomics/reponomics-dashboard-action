name: Pre-release Validation

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to validate"
        required: true
        type: string
        default: main

permissions:
  contents: read

concurrency:
  group: pre-release-validation-${{ inputs.source_ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  action-template:
    name: Validate action and generated template together
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Validate action and workflow metadata
        run: |
          set -euo pipefail
          make validate-action
          make validate-workflows
          make validate-action-pins

      - name: Build and smoke-test generated template
        run: |
          set -euo pipefail
          make verify-workflow-classification
          make template-smoke

      - name: Run generated template consumers against candidate action
        run: |
          set -euo pipefail
          make template-consumer-e2e

      - name: Dry-run generated template publication
        run: |
          set -euo pipefail
          make publish-template-dry-run

      - name: Upload generated template artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-template-${{ github.run_id }}
          path: dist/template
          if-no-files-found: warn
          retention-days: 7
