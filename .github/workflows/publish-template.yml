name: Emergency Publish Template Repository

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to publish from"
        required: true
        type: string
        default: main
      confirm_unreleased_template_publish:
        description: "Emergency-only: publish without normal template release automation"
        required: true
        type: boolean
        default: false

permissions: {}

concurrency:
  group: template-publication-manual-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  publish-template:
    name: Emergency publish generated template
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_unreleased_template_publish }}
    runs-on: ubuntu-24.04
    environment: template-publication
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      TEMPLATE_REMOTE: reponomics-dashboard
      TEMPLATE_EXPECTED_REPO: reponomics/reponomics-dashboard
    steps:
      - name: Checkout release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.source_ref }}

      - name: Validate manual publication source
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          case "$SOURCE_REF" in
            main|refs/heads/main|reponomics-dashboard-v*|refs/tags/reponomics-dashboard-v*) ;;
            *)
              echo "Manual template publication is restricted to main or reponomics-dashboard-v* tags, got $SOURCE_REF." >&2
              exit 1
              ;;
          esac

      - name: Record manual unreleased publication
        run: |
          {
            echo "## Emergency template publication"
            echo
            echo "This run bypasses normal generated-template release automation and publishes from \`${{ inputs.source_ref }}\`."
            echo "Use this only for operator recovery. Normal template publication is handled by \`.github/workflows/template-release.yml\` after a template acceptance merge."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate generated template release gates
        run: |
          set -euo pipefail
          TEMPLATE_REMOTE="https://github.com/${TEMPLATE_EXPECTED_REPO}.git" make template-release-gates

      - name: Upload template release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reponomics-dashboard-template-manual-${{ github.run_id }}
          path: dist/template-release/*
          if-no-files-found: error
          retention-days: 90

      - name: Attest template release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/template-release/reponomics-dashboard-template-*.tar.gz
            dist/template-release/reponomics-dashboard-template-*.tree.jsonl
            dist/template-release/SHA256SUMS

      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: reponomics-dashboard
          permission-contents: write
          permission-workflows: write

      - name: Configure template remote
        env:
          RELEASE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git remote add "${TEMPLATE_REMOTE}" "https://x-access-token:${RELEASE_TOKEN}@github.com/${TEMPLATE_EXPECTED_REPO}.git"

      - name: Publish generated template repository
        run: |
          set -euo pipefail
          venv/bin/python scripts/publish_generated_repo.py \
            --output dist/template \
            --remote "${TEMPLATE_REMOTE}" \
            --branch main \
            --expected-repo "${TEMPLATE_EXPECTED_REPO}" \
            --message "chore: publish generated template manual" \
            --push
