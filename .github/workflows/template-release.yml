name: Template Release

on:
  push:
    branches: [main]
    paths:
      - template-contract.yml

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: generated-template-publication-reponomics-dashboard
  queue: max
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  template-release-gates:
    name: Validate template release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      accepted_action_sha: ${{ steps.metadata.outputs.accepted_action_sha }}
      accepted_action_tag: ${{ steps.metadata.outputs.accepted_action_tag }}
      accepted_action_version: ${{ steps.metadata.outputs.accepted_action_version }}
      generated_release_exists: ${{ steps.release-status.outputs.exists }}
      should_publish: ${{ steps.publication.outputs.should_publish }}
      source_tag_commit: ${{ steps.source-tag.outputs.commit }}
      source_tag_status: ${{ steps.source-tag.outputs.status }}
      template_tag: ${{ steps.metadata.outputs.template_tag }}
      template_version: ${{ steps.metadata.outputs.template_version }}
    env:
      TEMPLATE_EXPECTED_REPO: reponomics/reponomics-dashboard
    steps:
      - name: Checkout release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make install

      - name: Read template release notes source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .tmp
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].body // ""' > .tmp/template-release-pr-body.md

      - name: Prepare template release metadata
        id: metadata
        run: |
          set -euo pipefail
          venv/bin/python scripts/template_release_notes.py \
            --github-output "$GITHUB_OUTPUT" \
            --release-notes .tmp/template-release-notes.md \
            --pr-body .tmp/template-release-pr-body.md

      - name: Check source template tag status
        id: source-tag
        env:
          TEMPLATE_TAG: ${{ steps.metadata.outputs.template_tag }}
        run: |
          set -euo pipefail

          git fetch --quiet --no-tags origin "refs/tags/${TEMPLATE_TAG}:refs/tags/${TEMPLATE_TAG}" || true
          existing="$(git rev-parse -q --verify "refs/tags/${TEMPLATE_TAG}^{commit}" || true)"
          current="$(git rev-parse HEAD)"

          if [ -z "${existing}" ]; then
            echo "status=absent" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "commit=${existing}" >> "$GITHUB_OUTPUT"
          if [ "${existing}" = "${current}" ]; then
            echo "status=current" >> "$GITHUB_OUTPUT"
            echo "Source template tag ${TEMPLATE_TAG} already points to ${current}."
            exit 0
          fi

          echo "status=other" >> "$GITHUB_OUTPUT"
          {
            echo "## Source template tag already exists"
            echo
            echo "Source template tag \`${TEMPLATE_TAG}\` already points to \`${existing}\`, not this source commit \`${current}\`."
            echo "Generated-template publication will continue only if the generated repository release already exists."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Source template tag ${TEMPLATE_TAG} already points to ${existing}; checking generated release before deciding whether to skip."

      - name: Create generated template read token
        id: read-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: reponomics-dashboard
          permission-contents: read

      - name: Check generated template release status
        id: release-status
        env:
          GH_TOKEN: ${{ steps.read-token.outputs.token }}
          TEMPLATE_TAG: ${{ steps.metadata.outputs.template_tag }}
          TEMPLATE_EXPECTED_REPO: ${{ env.TEMPLATE_EXPECTED_REPO }}
        run: |
          set -euo pipefail
          api_url="${GITHUB_API_URL}/repos/${TEMPLATE_EXPECTED_REPO}/releases/tags/${TEMPLATE_TAG}"
          http_status="$(
            curl -sS -L \
              -o .tmp/generated-template-release.json \
              -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_url}"
          )"

          case "${http_status}" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Generated template release ${TEMPLATE_TAG} already exists."
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Generated template release lookup failed with HTTP ${http_status}." >&2
              cat .tmp/generated-template-release.json >&2
              exit 1
              ;;
          esac

      - name: Stop if source tag belongs to another commit
        if: ${{ steps.source-tag.outputs.status == 'other' }}
        env:
          GENERATED_RELEASE_EXISTS: ${{ steps.release-status.outputs.exists }}
          SOURCE_TAG_COMMIT: ${{ steps.source-tag.outputs.commit }}
          TEMPLATE_TAG: ${{ steps.metadata.outputs.template_tag }}
        run: |
          set -euo pipefail

          if [ "${GENERATED_RELEASE_EXISTS}" = "true" ]; then
            {
              echo
              echo "Generated repository release \`${TEMPLATE_TAG}\` already exists, so no publication is needed from this source commit."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Generated template release ${TEMPLATE_TAG} already exists; skipping this source commit."
            exit 0
          fi

          {
            echo
            echo "Generated repository release \`${TEMPLATE_TAG}\` is missing."
            echo "Rerun or repair publication from the source-tag commit \`${SOURCE_TAG_COMMIT}\`, not from this later source commit."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Source template tag ${TEMPLATE_TAG} belongs to ${SOURCE_TAG_COMMIT}, but the generated repository release is missing." >&2
          echo "Rerun or repair publication from the tagged source commit." >&2
          exit 1

      - name: Validate template release gates
        if: ${{ steps.source-tag.outputs.status != 'other' }}
        run: |
          set -euo pipefail
          TEMPLATE_REMOTE="https://github.com/${TEMPLATE_EXPECTED_REPO}.git" make template-release-gates

      - name: Verify existing generated template release
        if: ${{ steps.source-tag.outputs.status != 'other' && steps.release-status.outputs.exists == 'true' }}
        env:
          READ_TOKEN: ${{ steps.read-token.outputs.token }}
          TEMPLATE_TAG: ${{ steps.metadata.outputs.template_tag }}
          TEMPLATE_EXPECTED_REPO: ${{ env.TEMPLATE_EXPECTED_REPO }}
        run: |
          set -euo pipefail
          target_url="https://x-access-token:${READ_TOKEN}@github.com/${TEMPLATE_EXPECTED_REPO}.git"
          venv/bin/python scripts/publish_generated_repo.py \
            --output dist/template \
            --remote "${target_url}" \
            --expected-repo "${TEMPLATE_EXPECTED_REPO}" \
            --verify-ref "refs/tags/${TEMPLATE_TAG}"

      - name: Record publication decision
        id: publication
        run: |
          set -euo pipefail
          if [ "${SOURCE_TAG_STATUS}" != "other" ] && [ "${GENERATED_RELEASE_EXISTS}" != "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GENERATED_RELEASE_EXISTS: ${{ steps.release-status.outputs.exists }}
          SOURCE_TAG_STATUS: ${{ steps.source-tag.outputs.status }}

      - name: Upload template release artifacts
        if: ${{ steps.publication.outputs.should_publish == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reponomics-dashboard-template-release-${{ steps.metadata.outputs.template_tag }}
          path: dist/template-release/*
          if-no-files-found: error
          retention-days: 90

      - name: Prepare publication handoff
        if: ${{ steps.publication.outputs.should_publish == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p dist/publication-handoff
          tar -C dist -czf dist/publication-handoff/template-publication.tgz template template-release
          cp .tmp/template-release-notes.md dist/publication-handoff/template-release-notes.md

      - name: Upload publication handoff
        if: ${{ steps.publication.outputs.should_publish == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reponomics-dashboard-template-publication-${{ steps.metadata.outputs.template_tag }}
          path: dist/publication-handoff/*
          if-no-files-found: error
          retention-days: 1

  publish-template-release:
    name: Publish template release
    needs: template-release-gates
    if: ${{ needs.template-release-gates.outputs.should_publish == 'true' }}
    runs-on: ubuntu-24.04
    environment: template-publication
    permissions:
      attestations: write
      contents: write
      id-token: write
    env:
      TEMPLATE_REMOTE: reponomics-dashboard
      TEMPLATE_EXPECTED_REPO: reponomics/reponomics-dashboard
    steps:
      - name: Checkout release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make install

      - name: Download publication handoff
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: reponomics-dashboard-template-publication-${{ needs.template-release-gates.outputs.template_tag }}
          path: .tmp/publication-handoff

      - name: Restore publication handoff
        run: |
          set -euo pipefail
          mkdir -p .tmp dist
          tar -C dist -xzf .tmp/publication-handoff/template-publication.tgz
          cp .tmp/publication-handoff/template-release-notes.md .tmp/template-release-notes.md

      - name: Attest template release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/template-release/reponomics-dashboard-template-*.tar.gz
            dist/template-release/reponomics-dashboard-template-*.tree.jsonl
            dist/template-release/SHA256SUMS

      - name: Create source template tag
        env:
          TEMPLATE_TAG: ${{ needs.template-release-gates.outputs.template_tag }}
        run: |
          set -euo pipefail

          git fetch --quiet --no-tags origin "refs/tags/${TEMPLATE_TAG}:refs/tags/${TEMPLATE_TAG}" || true
          existing="$(git rev-parse -q --verify "refs/tags/${TEMPLATE_TAG}^{commit}" || true)"
          current="$(git rev-parse HEAD)"

          if [ -n "${existing}" ]; then
            if [ "${existing}" != "${current}" ]; then
              echo "Source template tag ${TEMPLATE_TAG} points to ${existing}, not ${current}." >&2
              exit 1
            fi
            echo "Source template tag ${TEMPLATE_TAG} already points to ${current}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -c tag.gpgSign=false tag "${TEMPLATE_TAG}" "${current}"
          git push origin "refs/tags/${TEMPLATE_TAG}"

      - name: Create publication app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: reponomics-dashboard
          permission-contents: write
          permission-workflows: write

      - name: Configure template remote
        env:
          RELEASE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git remote add "${TEMPLATE_REMOTE}" "https://x-access-token:${RELEASE_TOKEN}@github.com/${TEMPLATE_EXPECTED_REPO}.git"

      - name: Publish generated template repository
        id: publish
        env:
          TEMPLATE_TAG: ${{ needs.template-release-gates.outputs.template_tag }}
        run: |
          set -euo pipefail
          venv/bin/python scripts/publish_generated_repo.py \
            --output dist/template \
            --remote "${TEMPLATE_REMOTE}" \
            --branch main \
            --expected-repo "${TEMPLATE_EXPECTED_REPO}" \
            --release-tag "${TEMPLATE_TAG}" \
            --github-output "$GITHUB_OUTPUT" \
            --message "chore: publish generated template ${TEMPLATE_TAG}" \
            --push

      - name: Write generated template release notes
        env:
          ACCEPTED_ACTION_TAG: ${{ needs.template-release-gates.outputs.accepted_action_tag }}
          ACCEPTED_ACTION_SHA: ${{ needs.template-release-gates.outputs.accepted_action_sha }}
          ACCEPTED_ACTION_VERSION: ${{ needs.template-release-gates.outputs.accepted_action_version }}
          PUBLISHED_COMMIT: ${{ steps.publish.outputs.published_commit }}
          SOURCE_COMMIT: ${{ github.sha }}
          TEMPLATE_TAG: ${{ needs.template-release-gates.outputs.template_tag }}
          TEMPLATE_VERSION: ${{ needs.template-release-gates.outputs.template_version }}
        run: |
          set -euo pipefail
          {
            echo "## Template publication"
            echo
            echo "- Template version: \`reponomics-dashboard v${TEMPLATE_VERSION}\`"
            echo "- Template tag: \`${TEMPLATE_TAG}\`"
            echo "- Generated commit: \`${PUBLISHED_COMMIT}\`"
            echo
            echo "## New-copy template changes"
            echo
            cat .tmp/template-release-notes.md
            echo
            echo "## Accepted action metadata"
            echo
            echo "- Accepted action version: \`${ACCEPTED_ACTION_VERSION}\`"
            echo "- Accepted action tag: \`${ACCEPTED_ACTION_TAG}\`"
            echo "- Accepted action SHA: \`${ACCEPTED_ACTION_SHA}\`"
            echo
            echo "## Provenance"
            echo
            echo "- Source commit: \`${SOURCE_COMMIT}\`"
            echo "- Source workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Template provenance: \`.reponomics/template-provenance.json\`"
          } > .tmp/generated-template-release-notes.md

      - name: Create generated template release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TEMPLATE_TAG: ${{ needs.template-release-gates.outputs.template_tag }}
          TEMPLATE_VERSION: ${{ needs.template-release-gates.outputs.template_version }}
          TEMPLATE_EXPECTED_REPO: ${{ env.TEMPLATE_EXPECTED_REPO }}
        run: |
          set -euo pipefail
          gh release create "${TEMPLATE_TAG}" \
            --repo "${TEMPLATE_EXPECTED_REPO}" \
            --verify-tag \
            --title "reponomics-dashboard v${TEMPLATE_VERSION}" \
            --notes-file .tmp/generated-template-release-notes.md
