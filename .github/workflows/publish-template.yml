name: Publish Template Repository

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

concurrency:
  group: template-release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  publish-template:
    name: Publish generated template
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'reponomics-dashboard-v') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      TEMPLATE_REMOTE: reponomics-dashboard
      TEMPLATE_EXPECTED_REPO: reponomics/reponomics-dashboard
    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
            reponomics-dashboard
          permission-contents: write
          permission-workflows: write

      - name: Checkout release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure template remote
        env:
          RELEASE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git remote add "${TEMPLATE_REMOTE}" "https://x-access-token:${RELEASE_TOKEN}@github.com/${TEMPLATE_EXPECTED_REPO}.git"

      - name: Verify workflow classification
        run: |
          set -euo pipefail
          make verify-workflow-classification

      - name: Build generated template
        run: |
          set -euo pipefail
          make build-template

      - name: Publish generated template repository
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || 'manual' }}
        run: |
          set -euo pipefail
          venv/bin/python scripts/publish_generated_repo.py \
            --output dist/template \
            --remote "${TEMPLATE_REMOTE}" \
            --branch main \
            --expected-repo "${TEMPLATE_EXPECTED_REPO}" \
            --message "chore: publish generated template ${RELEASE_TAG}" \
            --push
