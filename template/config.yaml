# Reponomics dashboard setup

i_have_read_the_readme: # true/false
data_mode: # encrypted/plaintext
publish_pages_dashboard: # true/false
publish_readme_dashboard: # true/false
allow_docs_sync: # true/false
artifact_retention_days: 90 # artifact expiry, not dashboard history length

# Reponomics may update docs/reponomics/ before collection when
# allow_docs_sync is true. Set it to false before editing that directory
# yourself.
#
# artifact_retention_days controls how long each uploaded GitHub Actions
# artifact remains downloadable if no successor artifact is uploaded. It does
# not limit how many days the dashboard can keep collecting data.

# Repository selection --------------------------------------------------------
#
# By default, Reponomics auto-discovers up to 200 eligible repositories visible
# to COLLECTION_TOKEN and fills the tracked set from newest to oldest by creation
# date.
#
# Use full owner/repo names for explicit entries.

max_repos: 200

# If non-empty, track exactly these repositories and ignore all other selection
# settings.
include_only:
  # - owner/repo-name

# Repositories that must always be tracked when accessible.
include:
  # - owner/important-repo

# Repositories that must never be tracked automatically.
exclude:
  # - owner/noisy-repo

# Fill remaining slots with other eligible repositories.
include_others: true

# Allow repositories created after the initial automatic-selection baseline to
# enter the automatic pool.
include_new: false

# Allow private repositories in the automatic pool when COLLECTION_TOKEN can see
# them.
include_private: true

# Advanced collection token mode ----------------------------------------------
#
# Keep false unless you bring your own GitHub App installation token workflow.
# Reponomics does not provide or operate a shared collection app.
use_github_app: false
