name: Reponomics Dashboard Action
author: Reponomics Contributors
description: Collect GitHub repository traffic and growth data, generate data dashboards, and handle rotation of encryption secrets.
branding:
  icon: bar-chart-2
  color: blue

inputs:
  mode:
    description: "Runtime mode: collect, publish, rotate-key, incident-reset, docs-sync, or doctor."
    required: true
    default: collect
  collection-token:
    description: Value of the API token used for repository data collection. Template workflows pass the repository secret named COLLECTION_TOKEN.
    required: false
    default: ""
  use-github-app:
    description: Advanced option for collect mode. Set true when collection-token is a user-owned GitHub App installation token minted in the workflow.
    required: false
    default: "false"
  github-token:
    description: "Token used for GitHub artifact/repository workflow operations. Required for collect artifact cleanup and incident-reset history purge; pass the caller workflow token through this input."
    required: false
    default: ""
  dashboard-secret:
    description: Current dashboard/artifact encryption secret. Required when data-mode is encrypted.
    required: false
    default: ""
  dashboard-next-secret:
    description: Next dashboard/artifact encryption secret for encrypted rotate-key or incident-reset mode.
    required: false
    default: ""
  comparison-secret:
    description: Optional second dashboard secret for doctor mode. Used to check whether a user-held key can decrypt the current dashboard artifact without entering it as a workflow input.
    required: false
    default: ""
  incident-confirm-mode:
    description: Destructive incident-reset confirmation. Must be INCIDENT_RESET_CONFIRMED for incident-reset mode.
    required: false
    default: ""
  incident-confirm-purge:
    description: Destructive incident-reset confirmation. Must be PURGE_OLD_HISTORY_CONFIRMED for incident-reset mode.
    required: false
    default: ""
  incident-confirm-next-secret:
    description: Destructive incident-reset confirmation. Must be NEXT_SECRET_CONFIRMED for incident-reset mode.
    required: false
    default: ""
  incident-confirm-irreversible:
    description: Destructive incident-reset confirmation. Must be IRREVERSIBLE_ACTION_CONFIRMED for incident-reset mode.
    required: false
    default: ""
  data-mode:
    description: "Data storage mode: encrypted or plaintext. Encrypted mode stores retained CSV artifacts and dashboard payloads encrypted with a dashboard secret. Plaintext mode stores retained CSV artifacts without encryption and is private-repository only."
    required: false
    default: encrypted
  config-path:
    description: Repository selection config path.
    required: false
    default: config.yaml
  retention-days:
    description: GitHub Actions artifact retention period, from 14 to 90 days.
    required: false
    default: "90"
  publish-pages:
    description: "Set false to render dashboard output without deploying GitHub Pages. Plaintext mode always disables Pages deployment."
    required: false
    default: "true"
  artifact-run-id:
    description: Optional workflow run ID whose dashboard-data artifact should be restored. Blank restores the latest available dashboard-data artifact.
    required: false
    default: ""
  require-collect-provenance:
    description: Require a matching collect provenance artifact before publishing. Use true for republishing retained data without collecting.
    required: false
    default: "false"
  generate-readme:
    description: Generate private-repository README dashboard output and commit it back to the caller repository.
    required: false
    default: "false"
  allow-docs-sync:
    description: Optional managed documentation update setting. Set true or false; blank uses config.yaml.
    required: false
    default: ""
  readme-path:
    description: README output path.
    required: false
    default: README.md

outputs:
  tracked-repos:
    description: Comma-separated repositories observed in canonical data.
    value: ${{ steps.runtime.outputs.tracked-repos }}
  collected-at:
    description: Latest manifest update timestamp.
    value: ${{ steps.runtime.outputs.collected-at }}
  data-mode:
    description: Resolved data mode.
    value: ${{ steps.runtime.outputs.data-mode }}
  publish-pages:
    description: Whether this run publishes the rendered dashboard to GitHub Pages.
    value: ${{ steps.runtime.outputs.publish-pages }}
  readme-updated:
    description: Whether the README output changed.
    value: ${{ steps.runtime.outputs.readme-updated }}
  dashboard-updated:
    description: Whether the dashboard output changed.
    value: ${{ steps.runtime.outputs.dashboard-updated }}
  pages-path:
    description: Rendered dashboard directory uploaded to Pages or a downloadable dashboard artifact.
    value: ${{ steps.runtime.outputs.pages-path }}
  page-url:
    description: Deployed GitHub Pages URL when a Pages dashboard is published.
    value: ${{ steps.deploy-pages.outputs.page_url }}
  schema-version:
    description: Retained dashboard data artifact schema version.
    value: ${{ steps.runtime.outputs.schema-version }}
  runtime-version:
    description: Reponomics action runtime version.
    value: ${{ steps.runtime.outputs.runtime-version }}
  docs-sync-state:
    description: Managed documentation sync state.
    value: ${{ steps.runtime.outputs.docs-sync-state }}
  docs-action-version:
    description: Action version that generated the local managed documentation.
    value: ${{ steps.runtime.outputs.docs-action-version }}
  docs-updated-at:
    description: Timestamp recorded when the local managed documentation was last written.
    value: ${{ steps.runtime.outputs.docs-updated-at }}
  doctor-report-path:
    description: Path to the machine-readable doctor diagnostic report when mode is doctor.
    value: ${{ steps.runtime.outputs.doctor-report-path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"

    - name: Install runtime dependencies
      shell: bash
      run: python -m pip install --require-hashes -r "$GITHUB_ACTION_PATH/requirements-runtime.txt"

    - name: Run Reponomics runtime
      id: runtime
      shell: bash
      env:
        REPONOMICS_MODE: ${{ inputs.mode }}
        REPONOMICS_COLLECTION_TOKEN: ${{ inputs.collection-token }}
        REPONOMICS_USE_GITHUB_APP: ${{ inputs.use-github-app }}
        REPONOMICS_GITHUB_TOKEN: ${{ inputs.github-token }}
        REPONOMICS_DASHBOARD_SECRET: ${{ inputs.dashboard-secret }}
        REPONOMICS_DASHBOARD_NEXT_SECRET: ${{ inputs.dashboard-next-secret }}
        REPONOMICS_COMPARISON_SECRET: ${{ inputs.comparison-secret }}
        REPONOMICS_DATA_MODE: ${{ inputs.data-mode }}
        REPONOMICS_CONFIG_PATH: ${{ inputs.config-path }}
        REPONOMICS_RETENTION_DAYS: ${{ inputs.retention-days }}
        REPONOMICS_PUBLISH_PAGES: ${{ inputs.publish-pages }}
        REPONOMICS_ARTIFACT_RUN_ID: ${{ inputs.artifact-run-id }}
        REPONOMICS_REQUIRE_COLLECT_PROVENANCE: ${{ inputs.require-collect-provenance }}
        REPONOMICS_GENERATE_README: ${{ inputs.generate-readme }}
        REPONOMICS_ALLOW_DOCS_SYNC: ${{ inputs.allow-docs-sync }}
        REPONOMICS_README_PATH: ${{ inputs.readme-path }}
        REPONOMICS_INCIDENT_CONFIRM_MODE: ${{ inputs.incident-confirm-mode }}
        REPONOMICS_INCIDENT_CONFIRM_PURGE: ${{ inputs.incident-confirm-purge }}
        REPONOMICS_INCIDENT_CONFIRM_NEXT_SECRET: ${{ inputs.incident-confirm-next-secret }}
        REPONOMICS_INCIDENT_CONFIRM_IRREVERSIBLE: ${{ inputs.incident-confirm-irreversible }}
        REPONOMICS_ACTION_REF: ${{ github.action_ref }}
        REPONOMICS_ACTION_REPOSITORY: ${{ github.action_repository }}
      run: PYTHONPATH="$GITHUB_ACTION_PATH" python -m dashboard_action.run

    - name: Verify GitHub Pages configuration
      if: ${{ (inputs.mode == 'publish' || inputs.mode == 'rotate-key') && steps.runtime.outputs.publish-pages == 'true' }}
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      with:
        enablement: "false"

    - name: Upload GitHub Pages artifact
      if: ${{ (inputs.mode == 'publish' || inputs.mode == 'rotate-key') && steps.runtime.outputs.publish-pages == 'true' }}
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
      with:
        name: html-dashboard-encrypted
        path: ${{ steps.runtime.outputs.pages-path }}
        retention-days: ${{ inputs.retention-days }}

    - name: Deploy GitHub Pages
      id: deploy-pages
      if: ${{ (inputs.mode == 'publish' || inputs.mode == 'rotate-key') && steps.runtime.outputs.publish-pages == 'true' }}
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
      with:
        artifact_name: html-dashboard-encrypted

    - name: Upload plaintext dashboard artifact
      if: ${{ inputs.mode == 'publish' && steps.runtime.outputs.publish-pages == 'false' && steps.runtime.outputs.data-mode == 'plaintext' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-dashboard-plaintext
        path: ${{ steps.runtime.outputs.pages-path }}
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Upload encrypted dashboard artifact
      if: ${{ (inputs.mode == 'publish' || inputs.mode == 'rotate-key') && steps.runtime.outputs.publish-pages == 'false' && steps.runtime.outputs.data-mode == 'encrypted' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-dashboard-encrypted
        path: ${{ steps.runtime.outputs.pages-path }}
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Upload doctor diagnostic report
      if: ${{ always() && inputs.mode == 'doctor' && steps.runtime.outputs.doctor-report-path != '' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: reponomics-doctor-report
        path: ${{ steps.runtime.outputs.doctor-report-path }}
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Upload encrypted dashboard data artifact
      if: ${{ steps.runtime.outputs.data-mode == 'encrypted' && inputs.mode != 'publish' && inputs.mode != 'docs-sync' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dashboard-data
        path: .dashboard-data-artifact/dashboard-data.enc
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Upload dashboard data artifact
      if: ${{ steps.runtime.outputs.data-mode == 'plaintext' && inputs.mode != 'publish' && inputs.mode != 'docs-sync' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dashboard-data
        path: data
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Upload collect provenance artifact
      if: ${{ inputs.mode == 'collect' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: reponomics-collect-provenance
        path: .reponomics/collect-provenance/collect-provenance.json
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Clean up superseded dashboard data artifacts
      if: ${{ inputs.mode == 'collect' }}
      shell: bash
      env:
        REPONOMICS_MODE: collect
        REPONOMICS_GITHUB_TOKEN: ${{ inputs.github-token }}
        REPONOMICS_DATA_MODE: ${{ inputs.data-mode }}
        REPONOMICS_CONFIG_PATH: ${{ inputs.config-path }}
        REPONOMICS_RETENTION_DAYS: ${{ inputs.retention-days }}
        REPONOMICS_COLLECT_RETENTION_CLEANUP_ONLY: "true"
      run: PYTHONPATH="$GITHUB_ACTION_PATH" python -m dashboard_action.run

    - name: Purge incident reset history
      if: ${{ inputs.mode == 'incident-reset' }}
      shell: bash
      env:
        REPONOMICS_MODE: incident-reset
        REPONOMICS_GITHUB_TOKEN: ${{ inputs.github-token }}
        REPONOMICS_DASHBOARD_SECRET: ${{ inputs.dashboard-secret }}
        REPONOMICS_DASHBOARD_NEXT_SECRET: ${{ inputs.dashboard-next-secret }}
        REPONOMICS_DATA_MODE: ${{ inputs.data-mode }}
        REPONOMICS_CONFIG_PATH: ${{ inputs.config-path }}
        REPONOMICS_RETENTION_DAYS: ${{ inputs.retention-days }}
        REPONOMICS_INCIDENT_CONFIRM_MODE: ${{ inputs.incident-confirm-mode }}
        REPONOMICS_INCIDENT_CONFIRM_PURGE: ${{ inputs.incident-confirm-purge }}
        REPONOMICS_INCIDENT_CONFIRM_NEXT_SECRET: ${{ inputs.incident-confirm-next-secret }}
        REPONOMICS_INCIDENT_CONFIRM_IRREVERSIBLE: ${{ inputs.incident-confirm-irreversible }}
        REPONOMICS_INCIDENT_RESET_PURGE_ONLY: "true"
      run: PYTHONPATH="$GITHUB_ACTION_PATH" python -m dashboard_action.run
