name: Reponomics Dashboard Action
author: Reponomics Contributors
description: Collect GitHub repository traffic and growth data, generate data dashboards, and handle rotation of encryption secrets.
branding:
  icon: bar-chart-2
  color: blue

inputs:
  mode:
    description: "Runtime mode: collect, publish, or rotate-key."
    required: true
    default: collect
  traffic-token:
    description: Token used for GitHub traffic/repository APIs.
    required: false
    default: ""
  github-token:
    description: Token used for GitHub artifact/repository workflow operations.
    required: false
    default: ""
  dashboard-secret:
    description: Current dashboard/artifact encryption secret. Required when privacy-mode is strong or casual.
    required: false
    default: ""
  dashboard-next-secret:
    description: Next dashboard/artifact encryption secret for strong or casual rotate-key mode.
    required: false
    default: ""
  privacy-mode:
    description: "Privacy model: strong, casual, or plain. Strong requires a high-entropy dashboard secret; casual encrypts with any non-empty dashboard secret for non-targeted access control; plain stores retained CSV artifacts without encryption for private-repository use."
    required: false
    default: strong
  config-path:
    description: Repository selection config path.
    required: false
    default: config.yaml
  retention-days:
    description: GitHub Actions artifact retention period.
    required: false
    default: "90"
  generate-readme:
    description: Generate README dashboard output and commit it back to the caller repository.
    required: false
    default: "false"
  readme-path:
    description: README output path.
    required: false
    default: README.md
  update-notices:
    description: "Best-effort metadata-only update notices from constrained Reponomics GitHub Release blocks: true or false."
    required: false
    default: "true"

outputs:
  tracked-repos:
    description: Comma-separated repositories observed in canonical data.
    value: ${{ steps.runtime.outputs.tracked-repos }}
  collected-at:
    description: Latest manifest update timestamp.
    value: ${{ steps.runtime.outputs.collected-at }}
  artifact-mode:
    description: Resolved artifact security mode.
    value: ${{ steps.runtime.outputs.artifact-mode }}
  dashboard-mode:
    description: Resolved Pages dashboard mode.
    value: ${{ steps.runtime.outputs.dashboard-mode }}
  readme-updated:
    description: Whether the README output changed.
    value: ${{ steps.runtime.outputs.readme-updated }}
  dashboard-updated:
    description: Whether the dashboard output changed.
    value: ${{ steps.runtime.outputs.dashboard-updated }}
  pages-path:
    description: Directory uploaded for GitHub Pages deployment.
    value: ${{ steps.runtime.outputs.pages-path }}
  page-url:
    description: Deployed GitHub Pages URL when a Pages dashboard is published.
    value: ${{ steps.deploy-pages.outputs.page_url }}
  schema-version:
    description: Retained traffic artifact schema version.
    value: ${{ steps.runtime.outputs.schema-version }}
  runtime-version:
    description: Reponomics action runtime version.
    value: ${{ steps.runtime.outputs.runtime-version }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Install runtime dependencies
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run Reponomics runtime
      id: runtime
      shell: bash
      env:
        REPONOMICS_MODE: ${{ inputs.mode }}
        REPONOMICS_TRAFFIC_TOKEN: ${{ inputs.traffic-token }}
        REPONOMICS_GITHUB_TOKEN: ${{ inputs.github-token }}
        REPONOMICS_DASHBOARD_SECRET: ${{ inputs.dashboard-secret }}
        REPONOMICS_DASHBOARD_NEXT_SECRET: ${{ inputs.dashboard-next-secret }}
        REPONOMICS_PRIVACY_MODE: ${{ inputs.privacy-mode }}
        REPONOMICS_CONFIG_PATH: ${{ inputs.config-path }}
        REPONOMICS_RETENTION_DAYS: ${{ inputs.retention-days }}
        REPONOMICS_GENERATE_README: ${{ inputs.generate-readme }}
        REPONOMICS_README_PATH: ${{ inputs.readme-path }}
        REPONOMICS_UPDATE_NOTICES: ${{ inputs.update-notices }}
        REPONOMICS_ACTION_REF: ${{ github.action_ref }}
        REPONOMICS_ACTION_REPOSITORY: ${{ github.action_repository }}
      run: python "$GITHUB_ACTION_PATH/dashboard_action/run.py"

    - name: Configure GitHub Pages
      if: ${{ inputs.mode != 'collect' && steps.runtime.outputs.dashboard-mode != 'disabled' }}
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

    - name: Upload GitHub Pages artifact
      if: ${{ inputs.mode != 'collect' && steps.runtime.outputs.dashboard-mode != 'disabled' }}
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
      with:
        path: ${{ steps.runtime.outputs.pages-path }}

    - name: Deploy GitHub Pages
      id: deploy-pages
      if: ${{ inputs.mode != 'collect' && steps.runtime.outputs.dashboard-mode != 'disabled' }}
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

    - name: Upload encrypted traffic data artifact
      if: ${{ steps.runtime.outputs.artifact-mode == 'encrypted' && inputs.mode != 'publish' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: traffic-data
        path: .traffic-artifact/traffic-data.enc
        retention-days: ${{ inputs.retention-days }}
        overwrite: true

    - name: Upload traffic data artifact
      if: ${{ steps.runtime.outputs.artifact-mode == 'plain' && inputs.mode != 'publish' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: traffic-data
        path: data
        retention-days: ${{ inputs.retention-days }}
        overwrite: true
