name: Pre-release Validation

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to validate"
        required: true
        type: string
        default: main

permissions:
  contents: read

concurrency:
  group: pre-release-validation-${{ inputs.source_ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  action-template:
    name: Validate action and generated template together
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Validate action and workflow metadata
        run: |
          set -euo pipefail
          make validate

      - name: Build and smoke-test generated template
        run: |
          set -euo pipefail
          make verify-workflow-classification
          make validate-template-action-ref
          make template-smoke

      - name: Run generated template compatibility against candidate action
        run: |
          set -euo pipefail
          make template-compat-e2e

      - name: Dry-run generated template publication
        run: |
          set -euo pipefail
          make publish-template-dry-run

      - name: Upload generated template artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-template-${{ github.run_id }}
          path: dist/template
          if-no-files-found: warn
          retention-days: 7
